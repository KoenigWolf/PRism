name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/prism_test
  DIRECT_URL: postgresql://postgres:postgres@localhost:5432/prism_test
  AUTH_SECRET: test-secret-for-ci-only
  NEXTAUTH_URL: http://localhost:3000
  OPENAI_API_KEY: sk-test-key-for-ci

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: prism_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Lint
      - run: npm run lint

      # Type check
      - run: npx tsc --noEmit

      # DB setup
      - run: npx prisma db push --skip-generate
      - run: npx prisma generate
      - run: npx prisma db seed

      # Unit & Integration tests
      - run: npm run test -- --run

      # Build check
      - run: npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: lint-and-test
    # E2E tests require complex setup, skip for now
    if: false

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: prism_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}

      - run: npx playwright install --with-deps

      - run: npx prisma db push --skip-generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/prism_test
          DIRECT_URL: postgresql://postgres:postgres@localhost:5432/prism_test
      - run: npx prisma generate
      - run: npx prisma db seed
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/prism_test
          DIRECT_URL: postgresql://postgres:postgres@localhost:5432/prism_test

      - run: npm run test:e2e
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/prism_test
          DIRECT_URL: postgresql://postgres:postgres@localhost:5432/prism_test
          AUTH_SECRET: test-secret-for-ci-only
          NEXTAUTH_URL: http://localhost:3000

  security:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Check for known vulnerabilities
      - name: Security audit
        run: npm audit --audit-level=high

      # Check for secrets in code
      - name: Check for secrets
        run: |
          if grep -rE "(sk-[a-zA-Z0-9]{48}|password\s*=\s*['\"][^'\"]+['\"])" --include="*.ts" --include="*.tsx" --include="*.js" src/ 2>/dev/null; then
            echo "Potential secrets found in code!"
            exit 1
          fi
          echo "No secrets detected"
